name: icon_switcher
description: A Flutter plugin to dynamically change your app icon at runtime. Supports iOS, Android, Web (favicon), macOS, Windows, and Linux.
version: 1.0.0
repository: https://github.com/timthetimber/icon_switcher
issue_tracker: https://github.com/timthetimber/icon_switcher/issues

environment:
  sdk: ">=3.4.0 <4.0.0"
  flutter: ">=3.22.0"

platforms:
  android:
  ios:
  web:
  macos:
  windows:
  linux:

dependencies:
  flutter:
    sdk: flutter
  flutter_web_plugins:
    sdk: flutter
  web: ^1.1.0
  plugin_platform_interface: ^2.1.0

dev_dependencies:
  flutter_lints: ^5.0.0
  flutter_test:
    sdk: flutter

flutter:
  plugin:
    platforms:
      ios:
        pluginClass: SwiftIconSwitcherPlugin
      android:
        package: de.timthetimber.iconswitcher
        pluginClass: IconSwitcherPlugin
      web:
        pluginClass: IconSwitcherWeb
        fileName: icon_switcher_web.dart
      macos:
        pluginClass: IconSwitcherPlugin
      windows:
        pluginClass: IconSwitcherPluginCApi
      linux:
        pluginClass: IconSwitcherPlugin
